version: "3.9"

services:
  api-gateway:
    build: ./be/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - job-service
      - redis
      - rabbitmq
    networks: [be]

  auth-service:
    build: ./src/services/auth-service
    expose: ["8001"]
    networks: [be]

  job-service:
    build: ./be/services/job-service
    expose: ["8003"]
    networks: [be]

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks: [be]

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks: [be]

  postgres-auth:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Phuoc123456
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [be]

networks:
  be:
    driver: bridge
volumes:
  pgdata:
