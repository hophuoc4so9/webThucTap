services:
  api-gateway:
    build: ./be
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      job-service:
        condition: service_started
      cv-service:
        condition: service_started
      ai-search-service:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - uploads:/uploads
    networks: [be]

  auth-service:
    build:
      context: ./be/src/services/auth-service
      dockerfile: Dockerfile
    expose: ["8001"]
    restart: unless-stopped
    env_file:
      - ./be/src/services/auth-service/.env
    environment:
      NODE_OPTIONS: "--no-deprecation"
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [be]

  job-service:
    build:
      context: ./be/src/services/job-service
      dockerfile: Dockerfile
    expose: ["8003"]
    restart: unless-stopped
    env_file:
      - ./be/src/services/job-service/.env
    environment:
      NODE_OPTIONS: "--no-deprecation"
    depends_on:
      postgres-job:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [be]

  ai-search-service:
    build:
      context: ./be/src/services/ai-search-service
      dockerfile: Dockerfile
    expose: ["8005"]
    restart: unless-stopped
    env_file:
      - ./be/src/services/ai-search-service/.env
    environment:
      NODE_OPTIONS: "--no-deprecation --max-old-space-size=2048"
      DB_HOST: postgres-job
      DB_PORT: 5432
      DB_DATABASE: jobdb
      EMBEDDING_PROVIDER: local
    depends_on:
      postgres-job:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Cache embedding model to avoid re-downloading
    volumes:
      - huggingface-model-cache:/root/.cache/huggingface
    networks: [be]

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks: [be]

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks: [be]

  postgres-auth:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Phuoc123456
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [be]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-job:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Phuoc123456
      POSTGRES_DB: jobdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata-job:/var/lib/postgresql/data
    networks: [be]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cv-service:
    build:
      context: ./be/src/services/cv-service
      dockerfile: Dockerfile
    expose: ["8004"]
    restart: unless-stopped
    env_file:
      - ./be/src/services/cv-service/.env
    environment:
      NODE_OPTIONS: "--no-deprecation"
    depends_on:
      postgres-cv:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - uploads:/uploads
    networks: [be]

  postgres-cv:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Phuoc123456
      POSTGRES_DB: cvdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata-cv:/var/lib/postgresql/data
    networks: [be]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cvdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  be:
    driver: bridge
volumes:
  pgdata:
  pgdata-job:
  pgdata-cv:
  uploads:
  huggingface-model-cache:
